<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avani Birthday Surprise</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

#lock{
margin-top:120px;
}

input{
padding:10px;
font-size:18px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:8px;
background:#ff4f87;
color:white;
cursor:pointer;
}

#content{
display:none;
}

h1{
margin-top:30px;
font-size:38px;
color:#ff7aa2;
}

#envelope{
margin-top:120px;
font-size:80px;
cursor:pointer;
}

#message{
width:85%;
margin:auto;
font-size:20px;
line-height:1.7;
margin-top:20px;
display:none;
}

#photo{
margin-top:20px;
width:220px;
border-radius:15px;
box-shadow:0 0 20px pink;
display:none;
}

#video{
margin-top:20px;
width:260px;
border-radius:15px;
box-shadow:0 0 20px red;
display:none;
}

#final{
margin-top:25px;
font-size:30px;
color:pink;
display:none;
}

.heart{
position:absolute;
color:red;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<div id="lock">
<h2>🔒 Enter Password</h2>
<input type="password" id="pass">
<button onclick="check()">Open Surprise</button>
</div>

<div id="content">

<h1>💖 Avani Birthday Surprise 💖</h1>

<div id="envelope">💌</div>

<div id="message"></div>

<img id="photo" src="photo1.jpg">

<video id="video" autoplay muted loop>
<source src="video.mp4" type="video/mp4">
</video>

<div id="final">🎂 HAPPY BIRTHDAY AVANI 🎂</div>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function check(){
let p=document.getElementById("pass").value;

if(p=="avani123"){
document.getElementById("lock").style.display="none";
document.getElementById("content").style.display="block";
}
else{
alert("Wrong Password ❤️");
}
}

let text = `
Agar tum yeh message padh rahi ho...

Toh iska matlab hai tumne mera chhota sa surprise find kar liya 🎁😚

Step 1: Smile karo 😊
Step 2: Aankhein band karo 🙈
Step 3: Honey ko yaad karke wish maango ⭐
Step 4: Ab apna birthday surprise dekho ❤️

Happy Birthday Meri Wifey Avani 🎂

Tum meri life ki sabse special person ho.
Tumhari smile meri sabse badi happiness hai.

I love you sooo much
meri baccho ki mumma ❤️🎀
`;

let i=0;

function typing(){
if(i < text.length){
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typing,40);
}
else{
document.getElementById("video").style.display="block";
document.getElementById("final").style.display="block";
}
}

document.getElementById("envelope").onclick=function(){
document.getElementById("envelope").style.display="none";
document.getElementById("message").style.display="block";
document.getElementById("photo").style.display="block";
typing();
}

function hearts(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*30+20)+"px";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);
}

setInterval(hearts,300);

let photos=["photo1.jpg","photo2.jpg"];
let p=0;

setInterval(()=>{
p++;
if(p>=photos.length){p=0;}
document.getElementById("photo").src=photos[p];
},3000);

</script>

</body>
  </html>
